<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Tableau de Bord Analytique - Auto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
            text-align: center;
        }
        header h1 { color: #667eea; margin-bottom: 0.5rem; font-size: 2.5rem; }
        header p { color: #666; font-size: 1.05rem; }
        .status {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            color: #2e7d32;
        }
        .status.loading { background: #fff3cd; border-left-color: #ff9800; color: #856404; }
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card.accent1 { border-left-color: #667eea; }
        .stat-card.accent2 { border-left-color: #764ba2; }
        .stat-card.accent3 { border-left-color: #f093fb; }
        .stat-card.accent4 { border-left-color: #4facfe; }
        .stat-card h3 { color: #666; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .stat-number { font-size: 2.5rem; font-weight: bold; color: #2c3e50; margin-bottom: 0.3rem; }
        .stat-label { color: #999; font-size: 0.85rem; }
        .ranking-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        .ranking-section h2 { color: #667eea; margin-bottom: 1.5rem; font-size: 1.5rem; }
        .ranking-item {
            border-bottom: 1px solid #eee;
            transition: background 0.3s;
        }
        .ranking-item:last-child { border-bottom: none; }
        .ranking-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ranking-row:hover { background: #f8f9fa; }
        .ranking-position { font-size: 1.8rem; font-weight: bold; color: #667eea; width: 50px; text-align: center; flex-shrink: 0; }
        .ranking-title { flex: 1; color: #2c3e50; font-weight: 500; font-size: 1.05rem; }
        .ranking-meta { color: #999; font-size: 0.8rem; margin-top: 0.2rem; }
        .ranking-right { display: flex; align-items: center; gap: 1rem; }
        .ranking-count {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .ranking-toggle { color: #667eea; font-size: 1.2rem; transition: transform 0.3s; }
        .ranking-toggle.open { transform: rotate(180deg); }

        /* Panneau historique */
        .historique-panel {
            display: none;
            background: #f8f9ff;
            border-top: 1px solid #eee;
            padding: 1.2rem 1.5rem;
        }
        .historique-panel.open { display: block; }
        .historique-titre {
            font-size: 0.85rem;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.8rem;
        }
        .historique-vide {
            color: #999;
            font-size: 0.9rem;
            font-style: italic;
        }
        .historique-liste {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .historique-ligne {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.8rem;
            background: white;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            font-size: 0.9rem;
        }
        .historique-date { color: #2c3e50; font-weight: 500; }
        .historique-count {
            background: #667eea;
            color: white;
            padding: 0.2rem 0.7rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .insights {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        .insights h3 { margin-bottom: 1rem; font-size: 1.2rem; }
        .insights p { line-height: 1.6; opacity: 0.95; }
        .last-update { font-size: 0.85rem; color: #999; text-align: center; margin-top: 1rem; }
        .loading { text-align: center; padding: 2rem; color: #666; }
        @media (max-width: 768px) {
            header h1 { font-size: 1.8rem; }
            .stat-number { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Tableau de Bord Analytique</h1>
            <p>Vos statistiques se mettent à jour automatiquement chaque jour</p>
        </header>
        <div id="status" class="status loading"><p>⏳ Chargement des données...</p></div>
        <div id="main-content"><div class="loading"><p>⏳ Initialisation...</p></div></div>
    </div>
    <script>
        function fmtDate(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }

        async function loadAnalytics() {
            try {
                const response = await fetch('stats.json?t=' + Date.now());
                if (!response.ok) throw new Error('Données non disponibles');
                const data = await response.json();
                displayDashboard(data);
                updateStatus('✅ Données mises à jour: ' + new Date(data.dernièreMiseAJour).toLocaleString('fr-FR'), 'success');
            } catch (error) {
                console.error('Erreur:', error);
                updateStatus('⚠️ Données en cours de chargement...', 'info');
            }
        }

        function updateStatus(message, type) {
            const s = document.getElementById('status');
            s.textContent = message;
            if (type === 'success') {
                s.style.background = '#e8f5e9';
                s.style.borderLeftColor = '#4caf50';
                s.style.color = '#2e7d32';
            } else {
                s.style.background = '#fff3cd';
                s.style.borderLeftColor = '#ff9800';
                s.style.color = '#856404';
            }
        }

        function toggleHistorique(id) {
            const panel = document.getElementById('panel-' + id);
            const toggle = document.getElementById('toggle-' + id);
            if (panel.classList.contains('open')) {
                panel.classList.remove('open');
                toggle.classList.remove('open');
            } else {
                panel.classList.add('open');
                toggle.classList.add('open');
            }
        }

        function buildHistoriqueHTML(historique) {
            if (!historique || historique.length === 0) {
                return `<div class="historique-vide">Aucun détail disponible pour cette nouvelle.</div>`;
            }
            // Trier du plus récent au plus ancien
            const sorted = [...historique].sort((a, b) => b.date.localeCompare(a.date));
            const lignes = sorted.map(h => `
                <div class="historique-ligne">
                    <span class="historique-date">${fmtDate(h.date)}</span>
                    <span class="historique-count">${h.count} ⬇️</span>
                </div>
            `).join('');
            return `<div class="historique-liste">${lignes}</div>`;
        }

        function displayDashboard(data) {
            const total = data.total || 0;
            const classement = data.classement || [];
            const meilleur = classement.length > 0 ? classement[0] : null;
            const nombreNouvelles = data.totalNouvelles || classement.length;

            const rankingHTML = classement.map((item, i) => {
                const id = 'item-' + i;
                const derniereDate = item.derniere_date
                    ? 'Dernier téléchargement : ' + fmtDate(item.derniere_date)
                    : '';
                const hasHistory = item.historique && item.historique.length > 0;
                return `
                    <div class="ranking-item">
                        <div class="ranking-row" onclick="toggleHistorique('${id}')">
                            <div class="ranking-position">${i + 1}</div>
                            <div class="ranking-title">
                                ${item.titre}
                                ${derniereDate ? `<div class="ranking-meta">${derniereDate}</div>` : ''}
                            </div>
                            <div class="ranking-right">
                                <div class="ranking-count">${item.telecharges} ⬇️</div>
                                ${item.telecharges > 0 ? `<div class="ranking-toggle" id="toggle-${id}">▼</div>` : ''}
                            </div>
                        </div>
                        ${item.telecharges > 0 ? `
                        <div class="historique-panel" id="panel-${id}">
                            <div class="historique-titre">📅 Historique des téléchargements</div>
                            ${buildHistoriqueHTML(item.historique)}
                        </div>` : ''}
                    </div>
                `;
            }).join('');

            document.getElementById('main-content').innerHTML = `
                <div class="stats-overview">
                    <div class="stat-card accent1">
                        <h3>📥 Total Téléchargements</h3>
                        <div class="stat-number">${total}</div>
                        <div class="stat-label">depuis le début</div>
                    </div>
                    <div class="stat-card accent2">
                        <h3>📚 Nouvelles</h3>
                        <div class="stat-number">${nombreNouvelles}</div>
                        <div class="stat-label">disponibles</div>
                    </div>
                    <div class="stat-card accent3">
                        <h3>🏆 Meilleure</h3>
                        <div class="stat-number">${meilleur ? meilleur.telecharges : 0}</div>
                        <div class="stat-label">${meilleur ? meilleur.titre : 'N/A'}</div>
                    </div>
                    <div class="stat-card accent4">
                        <h3>🔄 Mise à jour</h3>
                        <div class="stat-number">Auto</div>
                        <div class="stat-label">chaque jour 8h</div>
                    </div>
                </div>
                <div class="ranking-section">
                    <h2>🏆 Classement des Nouvelles <span style="font-size:0.85rem;font-weight:400;color:#999;">— cliquez pour voir le détail</span></h2>
                    ${rankingHTML}
                    <div class="last-update">
                        Mise à jour: ${new Date(data.dernièreMiseAJour).toLocaleDateString('fr-FR', {
                            year: 'numeric', month: 'long', day: 'numeric',
                            hour: '2-digit', minute: '2-digit'
                        })}
                    </div>
                </div>
                <div class="insights">
                    <h3>✨ Fonctionnement Automatisé</h3>
                    <p>
                        Ce tableau de bord se met à jour <strong>automatiquement chaque jour à 8h du matin</strong> 
                        sans aucune intervention manuelle ! 🚀<br><br>
                        Les données proviennent directement de votre compte GoatCounter. Vous pouvez mesurer 
                        l'impact de vos campagnes Facebook en comparant les chiffres jour après jour.
                    </p>
                </div>
            `;
        }

        loadAnalytics();
        setInterval(loadAnalytics, 3600000);
    </script>
</body>
</html>
