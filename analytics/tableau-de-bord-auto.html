<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques — Frédéric Sarboni Sanchez</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --encre: #1a1a2e;
            --ardoise: #2d3561;
            --brume: #f4f6f9;
            --blanc: #ffffff;
            --accent: #c84b31;
            --accent-doux: #f0e8e5;
            --texte: #3a3a4a;
            --texte-leger: #7a7a8a;
            --bordure: #e2e5ed;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--brume);
            color: var(--texte);
            min-height: 100vh;
        }

        /* ── EN-TÊTE ── */
        header {
            background: var(--encre);
            color: var(--blanc);
            padding: 2.5rem 2rem 2rem;
            text-align: center;
        }

        header .eyebrow {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        header .subtitle {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.55);
            font-weight: 300;
        }

        .status-bar {
            background: var(--ardoise);
            padding: 0.6rem 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── CONTENU ── */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* ── CHIFFRES CLÉS ── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .kpi {
            background: var(--blanc);
            border-radius: 10px;
            padding: 1.4rem 1.2rem;
            border-top: 3px solid var(--bordure);
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .kpi.highlight { border-top-color: var(--accent); }

        .kpi-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--texte-leger);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .kpi-value {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--encre);
            line-height: 1;
            margin-bottom: 0.3rem;
        }

        .kpi-sub {
            font-size: 0.8rem;
            color: var(--texte-leger);
        }

        /* ── CLASSEMENT ── */
        .section {
            background: var(--blanc);
            border-radius: 10px;
            padding: 1.8rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--encre);
            margin-bottom: 1.4rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--bordure);
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 0;
            border-bottom: 1px solid var(--bordure);
        }

        .ranking-item:last-child { border-bottom: none; }

        .rank-num {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--texte-leger);
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }

        .rank-num.top { color: var(--accent); }

        .rank-bar-wrap {
            flex: 1;
        }

        .rank-titre {
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--texte);
            margin-bottom: 0.35rem;
        }

        .rank-bar-bg {
            height: 5px;
            background: var(--bordure);
            border-radius: 3px;
            overflow: hidden;
        }

        .rank-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #e8845a);
            border-radius: 3px;
            transition: width 0.8s ease;
        }

        .rank-count {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--encre);
            min-width: 28px;
            text-align: right;
            flex-shrink: 0;
        }

        .rank-zero .rank-titre { color: var(--texte-leger); }
        .rank-zero .rank-count { color: var(--texte-leger); font-weight: 400; }

        /* ── CHARGEMENT / ERREUR ── */
        .loading-state {
            text-align: center;
            padding: 3rem;
            color: var(--texte-leger);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--bordure);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-state {
            background: #fff5f5;
            border: 1px solid #fcd0cc;
            border-radius: 8px;
            padding: 1.5rem;
            color: #c0392b;
            text-align: center;
        }

        /* ── PIED ── */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.78rem;
            color: var(--texte-leger);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .kpi-grid { grid-template-columns: 1fr 1fr; }
            .kpi-grid .kpi:last-child { grid-column: span 2; }
            .kpi-value { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="eyebrow">Nouvelles gratuites</div>
    <h1>Statistiques de téléchargement</h1>
    <p class="subtitle">Frédéric Sarboni Sanchez — données en temps réel</p>
</header>

<div class="status-bar">
    <span class="status-dot"></span>
    <span id="status-text">Connexion à GoatCounter…</span>
</div>

<div class="container">
    <div id="app">
        <div class="loading-state">
            <div class="spinner"></div>
            <p>Chargement des statistiques…</p>
        </div>
    </div>
</div>

<footer>
    Données <a href="https://fsarboni.goatcounter.com" target="_blank">GoatCounter</a> —
    <a href="/frederic-sarboni-auteur/">Retour au site</a>
</footer>

<script>
// ── CONFIG ──────────────────────────────────────────────
const GC_SITE    = 'fsarboni';
const GC_TOKEN   = '16m901bhtjcdeoen29dhd75yiefukbaf04eq2ena0bevsl7t3';
const GC_HOST    = `${GC_SITE}.goatcounter.com`;
const START_DATE = '2025-10-17';

// ── UTILITAIRES ─────────────────────────────────────────
function today() {
    return new Date().toISOString().split('T')[0];
}

function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('fr-FR', {
        day: 'numeric', month: 'long', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
    });
}

async function gcGet(path) {
    const url = `https://${GC_HOST}${path}`;
    const r = await fetch(url, {
        headers: { 'Authorization': `Bearer ${GC_TOKEN}` }
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
}

// ── RÉCUPÉRATION DES DONNÉES ─────────────────────────────
async function fetchDownloads() {
    const counts = {};
    let afterId = null;
    let pages = 0;

    while (pages < 50) {
        let url = `/api/v0/stats/hits?limit=200&start=${START_DATE}&end=${today()}`;
        if (afterId) url += `&after=${afterId}`;

        const data = await gcGet(url);
        if (!data.hits || data.hits.length === 0) break;

        data.hits.forEach(hit => {
            if (hit.path && hit.path.includes('download/')) {
                const fichier = hit.path.replace(/.*download\//, '');
                counts[fichier] = (counts[fichier] || 0) + (hit.count || 0);
            }
        });

        if (!data.more) break;
        afterId = data.hits[data.hits.length - 1].path_id;
        pages++;
    }

    return counts;
}

async function fetchNouvellesList() {
    try {
        const r = await fetch('/frederic-sarboni-auteur/data.json');
        const d = await r.json();
        return d.nouvelles_gratuites || [];
    } catch(e) {
        return [];
    }
}

// ── CORRESPONDANCE fichier GoatCounter → titre ───────────
function matchCounts(rawCounts, nouvelles) {
    const result = {};

    nouvelles.forEach(n => {
        const fichier = n.fichier.split('/').pop();
        const keyNorm = fichier.replace('.pdf','').toLowerCase().replace(/_/g,'-');
        let total = 0;

        Object.entries(rawCounts).forEach(([gcPath, count]) => {
            const pathNorm = gcPath.toLowerCase().replace('.pdf','').replace(/_/g,'-').replace(/%20/g,'-');
            if (pathNorm === keyNorm || pathNorm.includes(keyNorm) || keyNorm.includes(pathNorm)) {
                total += count;
            }
        });

        result[n.titre] = { count: total, fichier };
    });

    return result;
}

// ── RENDU ────────────────────────────────────────────────
function render(stats, updatedAt) {
    const entries = Object.entries(stats).sort((a,b) => b[1].count - a[1].count);
    const total   = entries.reduce((s, [,v]) => s + v.count, 0);
    const withDl  = entries.filter(([,v]) => v.count > 0).length;
    const best    = entries[0];
    const maxCount = best ? best[1].count : 1;

    document.getElementById('status-text').textContent =
        `Mis à jour le ${fmtDate(updatedAt)}`;

    document.getElementById('app').innerHTML = `
        <div class="kpi-grid">
            <div class="kpi highlight">
                <div class="kpi-label">Total téléchargements</div>
                <div class="kpi-value">${total}</div>
                <div class="kpi-sub">depuis oct. 2025</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Nouvelles téléchargées</div>
                <div class="kpi-value">${withDl}</div>
                <div class="kpi-sub">sur ${entries.length} disponibles</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Meilleure nouvelle</div>
                <div class="kpi-value">${best ? best[1].count : 0}</div>
                <div class="kpi-sub">${best ? best[0] : '—'}</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Classement des nouvelles</div>
            ${entries.map(([titre, {count}], i) => `
                <div class="ranking-item ${count === 0 ? 'rank-zero' : ''}">
                    <div class="rank-num ${i < 3 && count > 0 ? 'top' : ''}">${i+1}</div>
                    <div class="rank-bar-wrap">
                        <div class="rank-titre">${titre}</div>
                        <div class="rank-bar-bg">
                            <div class="rank-bar-fill" style="width:${maxCount > 0 ? Math.round(count/maxCount*100) : 0}%"></div>
                        </div>
                    </div>
                    <div class="rank-count">${count}</div>
                </div>
            `).join('')}
        </div>
    `;
}

function renderError(msg) {
    document.getElementById('status-text').textContent = 'Erreur de connexion';
    document.getElementById('app').innerHTML = `
        <div class="error-state">
            <p>⚠️ Impossible de charger les données GoatCounter.</p>
            <p style="font-size:0.85rem;margin-top:0.5rem;opacity:0.8">${msg}</p>
        </div>
    `;
}

// ── LANCEMENT ────────────────────────────────────────────
(async () => {
    try {
        const [rawCounts, nouvelles] = await Promise.all([
            fetchDownloads(),
            fetchNouvellesList()
        ]);

        if (nouvelles.length === 0) throw new Error('data.json introuvable');

        const stats = matchCounts(rawCounts, nouvelles);
        render(stats, new Date().toISOString());

    } catch(e) {
        console.error(e);
        renderError(e.message);
    }
})();
</script>

</body>
</html>
