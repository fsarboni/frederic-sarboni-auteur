<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Tableau de Bord Analytique - Mes Nouvelles</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
            text-align: center;
        }
        
        header h1 {
            color: #667eea;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }
        
        header p {
            color: #666;
            font-size: 1.05rem;
        }
        
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
        }
        
        .stat-card.accent1 { border-left-color: #667eea; }
        .stat-card.accent2 { border-left-color: #764ba2; }
        .stat-card.accent3 { border-left-color: #f093fb; }
        .stat-card.accent4 { border-left-color: #4facfe; }
        
        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 0.3rem;
        }
        
        .stat-label {
            color: #999;
            font-size: 0.85rem;
        }
        
        .chart-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .chart-section h2 {
            color: #667eea;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 2rem;
        }
        
        .ranking-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .ranking-section h2 {
            color: #667eea;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        
        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem;
            border-bottom: 1px solid #eee;
            transition: background 0.3s;
        }
        
        .ranking-item:hover {
            background: #f8f9fa;
        }
        
        .ranking-item:last-child {
            border-bottom: none;
        }
        
        .ranking-position {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
            width: 50px;
            text-align: center;
        }
        
        .ranking-title {
            flex: 1;
            color: #2c3e50;
            font-weight: 500;
            font-size: 1.05rem;
        }
        
        .ranking-count {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .period-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .period-btn {
            padding: 0.8rem 1.5rem;
            border: 2px solid #ddd;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        
        .period-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        .period-btn:hover {
            border-color: #667eea;
        }
        
        .insights {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        
        .insights h3 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        
        .insights p {
            line-height: 1.6;
            opacity: 0.95;
        }
        
        .tips {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        
        .tips h3 {
            color: #667eea;
            margin-bottom: 1rem;
        }
        
        .tips ul {
            list-style: none;
            padding-left: 0;
        }
        
        .tips li {
            padding: 0.5rem 0;
            color: #555;
            line-height: 1.6;
        }
        
        .tips li:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 0.5rem;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: #666;
        }
        
        .error {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        @media (max-width: 768px) {
            header h1 { font-size: 1.8rem; }
            .stat-number { font-size: 1.8rem; }
            .chart-container { height: 300px; }
            .period-selector { flex-direction: column; }
            .period-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Tableau de Bord Analytique</h1>
            <p>Mesurez l'impact de vos campagnes et analysez les tendances</p>
        </header>

        <div id="main-content">
            <div class="loading">
                <p>⏳ Chargement des données...</p>
            </div>
        </div>
    </div>

    <script>
        // Configuration GoatCounter
        const GOAT_SITE = 'fsarboni';
        
        async function loadAnalytics() {
            try {
                // Note: GoatCounter n'expose pas facilement son API publique
                // Cette version est une base pour l'affichage
                // Vous devrez remplir manuellement les données depuis GoatCounter
                
                displayDashboard();
                
            } catch (error) {
                console.error('Erreur:', error);
                showError();
            }
        }

        function displayDashboard() {
            const html = `
                <div class="insights">
                    <h3>📌 Comment utiliser ce tableau de bord</h3>
                    <p>
                        ⚠️ <strong>Important :</strong> Ce tableau de bord affiche vos données GoatCounter. 
                        Vous devez <strong>manuellement copier vos statistiques depuis GoatCounter</strong> 
                        (<a href="https://fsarboni.goatcounter.com/" target="_blank" style="color: white; text-decoration: underline;">https://fsarboni.goatcounter.com/</a>) 
                        et les coller ci-dessous. Cela vous permet de tracker vos campagnes facilement !
                    </p>
                </div>

                <div class="tips">
                    <h3>💡 Comment récupérer les données</h3>
                    <ul>
                        <li>Allez sur <strong>GoatCounter</strong> : https://fsarboni.goatcounter.com/</li>
                        <li>Cherchez les entrées <strong>/download/</strong></li>
                        <li>Notez les chiffres pour chaque nouvelle</li>
                        <li>Vous pouvez les entrer dans la section ci-dessous</li>
                    </ul>
                </div>

                <div class="stats-overview">
                    <div class="stat-card accent1">
                        <h3>📥 Total Téléchargements</h3>
                        <div class="stat-number" id="total-downloads">-</div>
                        <div class="stat-label">depuis le début</div>
                    </div>
                    
                    <div class="stat-card accent2">
                        <h3>📚 Nouvelles</h3>
                        <div class="stat-number" id="total-nouvelles">6</div>
                        <div class="stat-label">différentes téléchargées</div>
                    </div>
                    
                    <div class="stat-card accent3">
                        <h3>🎯 Meilleure Performance</h3>
                        <div class="stat-number" id="best-nouvelle">-</div>
                        <div class="stat-label">téléchargements</div>
                    </div>
                    
                    <div class="stat-card accent4">
                        <h3>📈 Cette Semaine</h3>
                        <div class="stat-number" id="week-downloads">-</div>
                        <div class="stat-label">téléchargements</div>
                    </div>
                </div>

                <div class="ranking-section">
                    <h2>🏆 Classement des Nouvelles</h2>
                    <p style="color: #999; margin-bottom: 1.5rem; font-size: 0.95rem;">
                        ℹ️ <strong>À remplir manuellement</strong> : Copiez les chiffres depuis GoatCounter 
                        (/download/...)
                    </p>
                    
                    <div id="ranking-container">
                        <div style="text-align: center; color: #999; padding: 2rem;">
                            <p>En attente de données...</p>
                            <p style="font-size: 0.9rem; margin-top: 1rem;">
                                Entrez vos statistiques GoatCounter ci-dessous pour les voir ici
                            </p>
                        </div>
                    </div>
                </div>

                <div class="chart-section">
                    <h2>📋 Formulaire de saisie des données</h2>
                    <p style="color: #666; margin-bottom: 1.5rem;">
                        Entrez les données de vos téléchargements depuis GoatCounter :
                    </p>
                    
                    <div id="data-form">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;">
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #2c3e50;">
                                    Le Dernier Rendez-vous
                                </label>
                                <input type="number" id="nouvelle-1" placeholder="0" min="0" style="width: 100%; padding: 0.8rem; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem;">
                            </div>
                            
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #2c3e50;">
                                    Celle qui savait lire
                                </label>
                                <input type="number" id="nouvelle-2" placeholder="0" min="0" style="width: 100%; padding: 0.8rem; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem;">
                            </div>
                            
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #2c3e50;">
                                    Le Dernier Sourire
                                </label>
                                <input type="number" id="nouvelle-3" placeholder="0" min="0" style="width: 100%; padding: 0.8rem; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem;">
                            </div>
                            
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #2c3e50;">
                                    Le Choix du Programmeur
                                </label>
                                <input type="number" id="nouvelle-4" placeholder="0" min="0" style="width: 100%; padding: 0.8rem; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem;">
                            </div>
                            
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #2c3e50;">
                                    Le Gardien des Songes
                                </label>
                                <input type="number" id="nouvelle-5" placeholder="0" min="0" style="width: 100%; padding: 0.8rem; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem;">
                            </div>
                            
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #2c3e50;">
                                    À la carte
                                </label>
                                <input type="number" id="nouvelle-6" placeholder="0" min="0" style="width: 100%; padding: 0.8rem; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem;">
                            </div>
                        </div>
                        
                        <div style="margin-top: 1.5rem;">
                            <button onclick="updateStats()" style="
                                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                                color: white;
                                padding: 1rem 2rem;
                                border: none;
                                border-radius: 25px;
                                font-weight: 600;
                                font-size: 1rem;
                                cursor: pointer;
                                transition: transform 0.3s;
                            " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                                📊 Mettre à jour les statistiques
                            </button>
                        </div>
                    </div>
                </div>

                <div class="insights">
                    <h3>💡 Conseils pour vos campagnes</h3>
                    <p>
                        📍 <strong>Suivez les pics :</strong> Après chaque post Facebook ou campagne, 
                        notez les augmentations de téléchargements. Cela vous montre quelle nouvelle 
                        intéresse le plus votre audience.<br><br>
                        
                        🎯 <strong>Optimisez :</strong> Concentrez vos efforts sur les nouvelles qui 
                        génèrent le plus de téléchargements.<br><br>
                        
                        📈 <strong>Tendances :</strong> Comparez les périodes pour voir ce qui fonctionne 
                        le mieux (jour de la semaine, heure, type de message, etc.)
                    </p>
                </div>
            `;
            
            document.getElementById('main-content').innerHTML = html;
        }

        function updateStats() {
            const stats = {
                'Le Dernier Rendez-vous': parseInt(document.getElementById('nouvelle-1').value) || 0,
                'Celle qui savait lire': parseInt(document.getElementById('nouvelle-2').value) || 0,
                'Le Dernier Sourire': parseInt(document.getElementById('nouvelle-3').value) || 0,
                'Le Choix du Programmeur': parseInt(document.getElementById('nouvelle-4').value) || 0,
                'Le Gardien des Songes': parseInt(document.getElementById('nouvelle-5').value) || 0,
                'À la carte': parseInt(document.getElementById('nouvelle-6').value) || 0
            };

            // Calculer les totaux
            const total = Object.values(stats).reduce((a, b) => a + b, 0);
            const best = Math.max(...Object.values(stats));
            const bestNew = Object.keys(stats).find(k => stats[k] === best);

            // Mettre à jour les cartes
            document.getElementById('total-downloads').textContent = total;
            document.getElementById('best-nouvelle').textContent = best;
            document.getElementById('week-downloads').textContent = '~' + Math.floor(total * 0.25);

            // Mettre à jour le classement
            const sorted = Object.entries(stats)
                .sort((a, b) => b[1] - a[1])
                .map(([titre, count], index) => `
                    <div class="ranking-item">
                        <div class="ranking-position">${index + 1}</div>
                        <div class="ranking-title">${titre}</div>
                        <div class="ranking-count">${count} ⬇️</div>
                    </div>
                `).join('');

            document.getElementById('ranking-container').innerHTML = sorted || 
                '<div style="text-align: center; color: #999; padding: 2rem;">Aucune donnée</div>';

            // Sauvegarder dans localStorage
            localStorage.setItem('analytics-stats', JSON.stringify(stats));
        }

        // Charger les données sauvegardées au démarrage
        function loadSavedStats() {
            const saved = localStorage.getItem('analytics-stats');
            if (saved) {
                const stats = JSON.parse(saved);
                Object.keys(stats).forEach((titre, index) => {
                    const inputId = `nouvelle-${index + 1}`;
                    const input = document.getElementById(inputId);
                    if (input) input.value = stats[titre];
                });
                updateStats();
            }
        }

        function showError() {
            document.getElementById('main-content').innerHTML = `
                <div class="error">
                    ⚠️ Erreur lors du chargement. Rafraîchissez la page.
                </div>
            `;
        }

        // Charger au démarrage
        loadAnalytics();
        
        // Charger les données sauvegardées après 1 seconde
        setTimeout(loadSavedStats, 1000);
    </script>
</body>
</html>
